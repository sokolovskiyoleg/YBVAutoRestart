formatting:
  serializer: MINIMESSAGE

schedule:
  restarts:
    - 'DAILY;06:00'

actions:
  - '[time:1800] message {PREFIX} <white>Рестарт сервера через <light_purple>{TIME}</light_purple>.</white>'
  - '[time:1800] sound ENTITY_PLAYER_LEVELUP 1.0 1.0'
  - '[time:600] message {PREFIX} <white>Рестарт сервера через <light_purple>{TIME}</light_purple>.</white>'
  - '[time:600] sound ENTITY_PLAYER_LEVELUP 1.0 1.0'
  - '[time:60] message {PREFIX} <white>Рестарт сервера через <light_purple>{TIME}</light_purple>.</white>'
  - '[time:60] actionbar {PREFIX} <white>Рестарт через <light_purple>{TIME}</light_purple>.</white>'
  - '[time:60] sound ENTITY_PLAYER_LEVELUP 1.0 1.0'
  - '[time:30] actionbar {PREFIX} <white>Рестарт через <light_purple>{TIME}</light_purple>.</white>'
  - '[time:10] message {PREFIX} <white>Рестарт сервера через <light_purple>{TIME}</light_purple>.</white>'
  - '[time:10] actionbar {PREFIX} <white>Рестарт через <light_purple>{TIME}</light_purple>.</white>'
  - '[time:10] sound ENTITY_PLAYER_LEVELUP 1.0 1.0'
  - '[time:5] actionbar {PREFIX} <white>Рестарт через <light_purple>{TIME}</light_purple>.</white>'
  - '[time:4] actionbar {PREFIX} <white>Рестарт через <light_purple>{TIME}</light_purple>.</white>'
  - '[time:3] actionbar {PREFIX} <white>Рестарт через <light_purple>{TIME}</light_purple>.</white>'
  - '[time:2] actionbar {PREFIX} <white>Рестарт через <light_purple>{TIME}</light_purple>.</white>'
  - '[time:1] actionbar {PREFIX} <white>Рестарт через <light_purple>{TIME}</light_purple>.</white>'
  - '[time:0] message {PREFIX} <white>Сервер перезапускается. Скоро можно будет зайти снова.</white>'
  - '[time:0] actionbar {PREFIX} <white>Сервер перезапускается.</white>'
  - '[time:0] sound ENTITY_PLAYER_LEVELUP 1.5 1.0'
  - '[time:0] command save-all'
  - '[time:0] command restart'

admin:
  now-countdown-seconds: 10

messages:
  prefix: '<light_purple><bold>YBVAutoRestart</bold></light_purple>'
