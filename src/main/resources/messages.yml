messages:
  prefix: '<light_purple><bold>YBVAutoRestart</bold></light_purple>'
  templates:
    status:
      none: '<yellow>Сейчас нет активного рестарта.</yellow>'
      next: '<white>Следующий рестарт через <light_purple>{TIME}</light_purple>. Точное время: <light_purple>{DATETIME}</light_purple>.</white>'
    command:
      common:
        unknown-subcommand: '<red>Неизвестная подкоманда. Используй: /{LABEL} status|reload|now|delay|stop</red>'
      status:
        no-permission: '<red>У тебя нет прав на просмотр статуса рестарта.</red>'
      reload:
        no-permission: '<red>У тебя нет прав на перезагрузку плагина.</red>'
        success: '<green>Конфигурация плагина перезагружена.</green>'
        failed: '<red>Не удалось перезагрузить конфигурацию. Подробности в консоли.</red>'
      now:
        no-permission: '<red>У тебя нет прав на принудительный рестарт.</red>'
        usage: '<red>Использование: /ybvautorestart now</red>'
        success: '<green>Принудительный отсчёт до рестарта запущен на <light_purple>{TIME}</light_purple>.</green>'
        broadcast: '<red>{PLAYER}</red> <white>запустил рестарт через <light_purple>{TIME}</light_purple>.</white>'
      delay:
        no-permission: '<red>У тебя нет прав на перенос рестарта.</red>'
        usage: '<red>Использование: /ybvautorestart delay [секунды]</red>'
        invalid-number: '<red>Некорректное число: <white>{VALUE}</white></red>'
        non-positive: '<red>Задержка должна быть больше нуля.</red>'
        no-active: '<red>Сейчас нет активного рестарта для переноса.</red>'
        success: '<green>Рестарт отложен на <light_purple>{TIME}</light_purple>.</green>'
        broadcast: '<yellow>Рестарт был отложен на <light_purple>{TIME}</light_purple> игроком <white>{PLAYER}</white>.</yellow>'
      stop:
        no-permission: '<red>У тебя нет прав на остановку рестарта.</red>'
        usage: '<red>Использование: /ybvautorestart stop</red>'
        no-active: '<red>Сейчас нет активного рестарта для остановки.</red>'
        success: '<green>Активный отсчёт до рестарта отменён.</green>'
        broadcast: '<yellow>Активный отсчёт до рестарта был отменён игроком <white>{PLAYER}</white>.</yellow>'
